<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Finanças — João</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f1117;
        --bg2: #181c27;
        --bg3: #1e2233;
        --card: #242840;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8eaf0;
        --text2: #8b90a0;
        --text3: #555a6e;
        --accent: #4f8ef7;
        --green: #2ec08a;
        --red: #f05c5c;
        --amber: #f5a623;
        --radius: 12px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* LOGIN */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .login-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }
      .login-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .login-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .login-group input {
        width: 100%;
        padding: 14px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 10px;
        color: var(--text);
        font-size: 16px;
        outline: none;
      }
      .btn-primary {
        width: 100%;
        padding: 15px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }

      /* LAYOUT RESPONSIVO */
      #app-screen {
        display: none;
      }

      /* Sidebar vira Bottom Nav no Mobile */
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: var(--text2);
        cursor: pointer;
        flex: 1;
        transition: 0.2s;
      }
      .nav-item.active {
        color: var(--accent);
        font-weight: 600;
      }
      .nav-item span {
        font-size: 20px;
        margin-bottom: 4px;
      }

      .main {
        margin-left: 0;
        padding-bottom: 90px;
        width: 100%;
      }
      .topbar {
        padding: 20px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 900;
      }
      .content {
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* FILTROS */
      .filters-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
      }
      select,
      input[type="month"] {
        width: 100%;
        padding: 12px;
        background: var(--bg3);
        color: white;
        border-radius: 10px;
        border: 1px solid var(--border2);
        outline: none;
      }

      /* METRICAS */
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .metric {
        background: var(--card);
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
      }
      .metric-label {
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 6px;
        font-weight: 700;
      }
      .metric-value {
        font-size: 16px;
        font-family: "DM Mono", monospace;
        font-weight: 600;
      }

      /* CARDS */
      .card {
        background: var(--card);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 20px;
        overflow-x: auto;
        border: 1px solid var(--border);
      }
      h3 {
        font-size: 14px;
        margin-bottom: 15px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* TABELAS */
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px;
      }
      td,
      th {
        padding: 14px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .green {
        color: var(--green);
      }
      .red {
        color: var(--red);
      }
      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(46, 192, 138, 0.15);
        color: var(--green);
      }
      .badge-amber {
        background: rgba(245, 166, 35, 0.15);
        color: var(--amber);
      }

      /* DESKTOP (> 768px) */
      @media (min-width: 768px) {
        .sidebar {
          top: 0;
          left: 0;
          width: 260px;
          height: 100vh;
          flex-direction: column;
          justify-content: flex-start;
          padding-top: 40px;
          border-right: 1px solid var(--border);
          border-top: none;
        }
        .nav-item {
          flex-direction: row;
          gap: 15px;
          font-size: 15px;
          padding: 15px 25px;
          text-align: left;
          width: 100%;
        }
        .nav-item span {
          font-size: 18px;
          margin-bottom: 0;
        }
        .main {
          margin-left: 260px;
          padding-bottom: 0;
        }
        .metrics {
          grid-template-columns: repeat(4, 1fr);
        }
        .filters-row {
          grid-template-columns: 220px 220px;
        }
        .topbar {
          padding: 25px 40px;
        }
        .content {
          padding: 30px 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <h2 style="margin-bottom: 25px">Barbosa Finanças</h2>
        <div class="login-group">
          <label>Usuário</label
          ><input type="text" id="l-user" placeholder="Digite seu usuário" />
        </div>
        <div class="login-group">
          <label>Senha</label
          ><input type="password" id="l-pass" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="doLogin()">
          Entrar no Sistema
        </button>
      </div>
    </div>

    <div id="app-screen">
      <div class="sidebar">
        <div class="nav-item active" onclick="showPage('dashboard', this)">
          <span>📊</span> Resumo
        </div>
        <div class="nav-item" onclick="showPage('lancamentos', this)">
          <span>📋</span> Lançamentos
        </div>
        <div class="nav-item" onclick="showPage('prazos', this)">
          <span>🗓</span> Prazos
        </div>
        <div class="nav-item" onclick="showPage('relatorios', this)">
          <span>📈</span> Relatórios
        </div>
      </div>

      <div class="main">
        <div class="topbar">
          <div class="filters-row">
            <input type="month" id="filtro-mes" onchange="renderTudo()" />
            <select id="filtro-usuario" onchange="renderTudo()">
              <option value="todos">Todos os Membros</option>
              <option value="Felipe">Felipe</option>
              <option value="João">João</option>
              <option value="Annia">Annia</option>
            </select>
          </div>
        </div>

        <div class="content">
          <div id="page-dashboard" class="page active">
            <div class="metrics" id="metrics-cards"></div>
            <div class="card">
              <h3>Fluxo de Caixa Mensal</h3>
              <canvas id="mainChart" style="max-height: 300px"></canvas>
            </div>
          </div>

          <div id="page-lancamentos" class="page" style="display: none">
            <div class="card">
              <h3>Histórico Detalhado</h3>
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="tb-corpo"></tbody>
              </table>
            </div>
          </div>

          <div id="page-prazos" class="page" style="display: none">
            <div class="card">
              <h3>Calendário</h3>
              <div id="calendar"></div>
            </div>
            <div class="card">
              <h3>Contas a Pagar</h3>
              <table>
                <thead>
                  <tr>
                    <th>Vencimento</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ação</th>
                  </tr>
                </thead>
                <tbody id="tb-pendencias"></tbody>
              </table>
            </div>
          </div>

          <div id="page-relatorios" class="page" style="display: none">
            <div class="card">
              <h3>Divisão por Usuário (Saídas)</h3>
              <canvas id="userChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SB_URL = "https://zgcimyinowcgwegsjilq.supabase.co";
      const SB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnY2lteWlub3djZ3dlZ3NqaWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ5ODMsImV4cCI6MjA5MDEyMDk4M30.y6pXC74FIfwSAeb6uP3WhftbQ82pVPKchOdQwKKxZJY";
      const _supabase = supabase.createClient(SB_URL, SB_KEY);

      let lancamentos = [],
        charts = {},
        calendar = null;
      const fmt = (v) =>
        "R$ " + (v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 });

      // Define o mês atual como padrão no filtro
      document.getElementById("filtro-mes").value = new Date()
        .toISOString()
        .substring(0, 7);

      function doLogin() {
        if (
          document.getElementById("l-user").value === "barbosas" &&
          document.getElementById("l-pass").value === "barbosa.2026"
        ) {
          sessionStorage.setItem("auth_joao", "true");
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("app-screen").style.display = "block";
          carregarDados();
        } else {
          alert("Acesso inválido.");
        }
      }

      async function carregarDados() {
        // Busca todos os dados da tabela correta
        const { data, error } = await _supabase
          .from("lancamentos2")
          .select("*")
          .order("data", { ascending: false });
        if (error) {
          console.error(error);
          return;
        }
        lancamentos = data;
        renderTudo();
      }

      function renderTudo() {
        const fMes = document.getElementById("filtro-mes").value;
        const fUser = document.getElementById("filtro-usuario").value;

        const filtrados = lancamentos.filter(
          (l) =>
            (fUser === "todos" || l.usuario === fUser) &&
            l.data.substring(0, 7) === fMes,
        );

        let ent = 0,
          sai = 0,
          pen = 0,
          sUser = {};
        const corpo = document.getElementById("tb-corpo"),
          corpoPen = document.getElementById("tb-pendencias");
        corpo.innerHTML = "";
        corpoPen.innerHTML = "";
        let evs = [];

        filtrados.forEach((l) => {
          const v = parseFloat(l.valor) || 0;
          if (l.status === "pago") {
            if (l.tipo === "entrada") ent += v;
            else {
              sai += v;
              sUser[l.usuario] = (sUser[l.usuario] || 0) + v;
            }
          } else {
            pen += v;
            corpoPen.innerHTML += `<tr><td>${l.data.split("-").reverse().join("/")}</td><td>${l.description}</td><td>${fmt(v)}</td><td><button onclick="marcarPago('${l.id}')" style="background:var(--green); border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Pagar</button></td></tr>`;
            evs.push({ title: l.description, start: l.data, color: "#f5a623" });
          }
          corpo.innerHTML += `<tr><td>${l.data.split("-").reverse().slice(0, 2).join("/")}</td><td>${l.description}<br><small style="color:var(--text3)">${l.usuario}</small></td><td class="${l.tipo === "entrada" ? "green" : "red"}">${fmt(v)}</td><td><span class="badge ${l.status === "pago" ? "badge-green" : "badge-amber"}">${l.status}</span></td></tr>`;
        });

        document.getElementById("metrics-cards").innerHTML = `
          <div class="metric"><div class="metric-label">Ganhos</div><div class="metric-value green">${fmt(ent)}</div></div>
          <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value red">${fmt(sai)}</div></div>
          <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value" style="color:var(--accent)">${fmt(ent - sai)}</div></div>
          <div class="metric"><div class="metric-label">Pendente</div><div class="metric-value" style="color:var(--amber)">${fmt(pen)}</div></div>`;

        initCharts(filtrados, sUser);
        initCalendar(evs);
      }

      async function marcarPago(id) {
        await _supabase
          .from("lancamentos2")
          .update({ status: "pago" })
          .eq("id", id);
        carregarDados();
      }

      function initCharts(dados, sUser) {
        if (charts.l) charts.l.destroy();
        if (charts.u) charts.u.destroy();

        const ctxL = document.getElementById("mainChart").getContext("2d");
        charts.l = new Chart(ctxL, {
          type: "line",
          data: {
            labels: dados
              .slice()
              .reverse()
              .map((l) => l.data.substring(8, 10)),
            datasets: [
              {
                label: "Movimentação",
                data: dados
                  .slice()
                  .reverse()
                  .map((l) => (l.tipo === "entrada" ? l.valor : -l.valor)),
                borderColor: "#4f8ef7",
                tension: 0.4,
                fill: true,
                backgroundColor: "rgba(79, 142, 247, 0.1)",
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              y: { grid: { color: "rgba(255,255,255,0.05)" } },
              x: { grid: { display: false } },
            },
          },
        });

        const ctxU = document.getElementById("userChart").getContext("2d");
        charts.u = new Chart(ctxU, {
          type: "doughnut",
          data: {
            labels: Object.keys(sUser),
            datasets: [
              {
                data: Object.values(sUser),
                backgroundColor: ["#4f8ef7", "#2ec08a", "#9b7cf4", "#f5a623"],
                borderWidth: 0,
              },
            ],
          },
          options: {
            plugins: {
              legend: {
                position: "bottom",
                labels: { color: "#8b90a0", padding: 20 },
              },
            },
          },
        });
      }

      function initCalendar(evs) {
        if (calendar) calendar.destroy();
        const el = document.getElementById("calendar");
        calendar = new FullCalendar.Calendar(el, {
          initialView: "dayGridMonth",
          locale: "pt-br",
          events: evs,
          height: 380,
          headerToolbar: { left: "prev", center: "title", right: "next" },
        });
        calendar.render();
      }

      function showPage(p, el) {
        document
          .querySelectorAll(".page")
          .forEach((d) => (d.style.display = "none"));
        document.getElementById("page-" + p).style.display = "block";
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));
        if (el) el.classList.add("active");
        if (p === "prazos" && calendar)
          setTimeout(() => calendar.updateSize(), 100);
      }

      if (sessionStorage.getItem("auth_joao") === "true") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "block";
        carregarDados();
      }
    </script>
  </body>
</html>
