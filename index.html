<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Finanças — Barbosas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
      /* Mantive seu CSS original exatamente como estava */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f1117;
        --bg2: #181c27;
        --bg3: #1e2233;
        --card: #242840;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8eaf0;
        --text2: #8b90a0;
        --text3: #555a6e;
        --accent: #4f8ef7;
        --green: #2ec08a;
        --red: #f05c5c;
        --amber: #f5a623;
        --radius: 12px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .login-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      .login-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .login-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .login-group input {
        width: 100%;
        padding: 14px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 10px;
        color: var(--text);
        font-size: 16px;
        outline: none;
      }
      .btn-primary {
        width: 100%;
        padding: 15px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      #app-screen {
        display: none;
      }
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: var(--text2);
        cursor: pointer;
        flex: 1;
      }
      .nav-item.active {
        color: var(--accent);
        font-weight: 600;
      }
      .main {
        margin-left: 0;
        padding-bottom: 90px;
        width: 100%;
      }
      .topbar {
        padding: 15px 20px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 900;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .content {
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .notif-bell {
        position: relative;
        font-size: 24px;
        cursor: pointer;
        padding: 5px;
      }
      .notif-badge {
        position: absolute;
        top: 0;
        right: 0;
        background: var(--red);
        color: white;
        font-size: 10px;
        font-weight: bold;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--bg);
      }
      .filters-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      select,
      input {
        width: 100%;
        padding: 10px;
        background: var(--bg3);
        color: white;
        border-radius: 10px;
        border: 1px solid var(--border2);
        outline: none;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .metric {
        background: var(--card);
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
      }
      .metric-value {
        font-size: 16px;
        font-family: "DM Mono", monospace;
        font-weight: 600;
      }
      .card {
        background: var(--card);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 20px;
        overflow-x: auto;
        border: 1px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 550px;
      }
      td,
      th {
        padding: 14px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .green {
        color: var(--green);
      }
      .red {
        color: var(--red);
      }
      .blue {
        color: var(--accent);
      }
      .amber {
        color: var(--amber);
      }
      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(46, 192, 138, 0.15);
        color: var(--green);
      }
      .badge-amber {
        background: rgba(245, 166, 35, 0.15);
        color: var(--amber);
      }
      .badge-gray {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text2);
      }

      @media (min-width: 768px) {
        .sidebar {
          top: 0;
          left: 0;
          width: 260px;
          height: 100vh;
          flex-direction: column;
          justify-content: flex-start;
          padding-top: 40px;
          border-right: 1px solid var(--border);
          border-top: none;
        }
        .nav-item {
          flex-direction: row;
          gap: 15px;
          font-size: 15px;
          padding: 15px 25px;
          text-align: left;
          width: 100%;
        }
        .main {
          margin-left: 260px;
          padding-bottom: 0;
        }
        .metrics {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      .fc-event-title {
        font-weight: 600 !important;
        font-size: 11px !important;
      }
      .fc-daygrid-event {
        cursor: pointer;
        border-radius: 4px !important;
        border: none !important;
        margin: 1px 2px !important;
        padding: 2px !important;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <h2 style="margin-bottom: 25px">Barbosa Finanças</h2>
        <div class="login-group">
          <label>Usuário</label><input type="text" id="l-user" />
        </div>
        <div class="login-group">
          <label>Senha</label><input type="password" id="l-pass" />
        </div>
        <button class="btn-primary" onclick="doLogin()">Entrar</button>
      </div>
    </div>

    <div id="app-screen">
      <div class="sidebar">
        <div class="nav-item active" onclick="showPage('dashboard', this)">
          <span>📊</span> Resumo
        </div>
        <div class="nav-item" onclick="showPage('lancamentos', this)">
          <span>📋</span> Lançamentos
        </div>
        <div class="nav-item" onclick="showPage('prazos', this)">
          <span>🗓</span> Prazos
        </div>
        <div class="nav-item" onclick="showPage('relatorios', this)">
          <span>📈</span> Relatórios
        </div>
      </div>

      <div class="main">
        <div class="topbar">
          <div class="filters-row">
            <input type="month" id="filtro-mes" onchange="renderTudo()" />
            <select id="filtro-usuario" onchange="renderTudo()">
              <option value="todos">Todos</option>
              <option value="Felipe">Felipe</option>
              <option value="João">João</option>
              <option value="Annia">Annia</option>
            </select>
          </div>
          <div
            class="notif-bell"
            onclick="showPage('prazos')"
            title="Ver pendências"
          >
            🔔
            <div id="bell-badge" class="notif-badge">!</div>
          </div>
        </div>

        <div class="content">
          <button
            class="btn-primary"
            style="margin-bottom: 20px; width: auto; padding: 12px 25px"
            onclick="openForm()"
          >
            + Novo Lançamento
          </button>

          <div id="form-container" class="card" style="display: none">
            <h3 id="form-title" style="margin-bottom: 15px">Novo Registro</h3>
            <div
              style="display: grid; gap: 10px; grid-template-columns: 1fr 1fr"
            >
              <input
                type="text"
                id="f-desc"
                placeholder="Descrição"
                style="grid-column: span 2"
              />
              <input
                type="number"
                id="f-valor"
                step="0.01"
                placeholder="Valor"
              />
              <input type="date" id="f-data" />
              <select id="f-tipo">
                <option value="saida">Saída</option>
                <option value="entrada">Entrada</option>
              </select>
              <select id="f-usuario">
                <option value="João">João</option>
                <option value="Felipe">Felipe</option>
                <option value="Annia">Annia</option>
              </select>
              <select id="f-status" style="grid-column: span 2">
                <option value="pago">Pago</option>
                <option value="pendente">Pendente</option>
              </select>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px">
              <button class="btn-primary" onclick="salvarNoBanco()">
                Gravar
              </button>
              <button
                class="btn-primary"
                style="background: #444"
                onclick="closeForm()"
              >
                Cancelar
              </button>
            </div>
          </div>

          <div id="page-dashboard" class="page active">
            <div class="metrics" id="metrics-cards"></div>
            <div class="card">
              <h3>Fluxo Mensal</h3>
              <canvas id="mainChart" style="max-height: 250px"></canvas>
            </div>
          </div>

          <div id="page-lancamentos" class="page" style="display: none">
            <div class="card">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tb-corpo"></tbody>
              </table>
            </div>
          </div>

          <div id="page-prazos" class="page" style="display: none">
            <div class="card"><div id="calendar"></div></div>
            <div class="card">
              <h3>Contas Próximas ao Vencimento</h3>
              <table>
                <thead>
                  <tr>
                    <th>Vencimento</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Pessoa</th>
                    <th>Ação</th>
                  </tr>
                </thead>
                <tbody id="tb-pendencias"></tbody>
              </table>
            </div>
          </div>

          <div id="page-relatorios" class="page" style="display: none">
            <div class="card">
              <h3>Gastos por Pessoa</h3>
              <canvas id="userChart" style="max-height: 300px"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SB_URL = "https://zgcimyinowcgwegsjilq.supabase.co";
      const SB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnY2lteWlub3djZ3dlZ3NqaWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ5ODMsImV4cCI6MjA5MDEyMDk4M30.y6pXC74FIfwSAeb6uP3WhftbQ82pVPKchOdQwKKxZJY";
      const _supabase = supabase.createClient(SB_URL, SB_KEY);

      let lancamentos = [];
      let meuGraficoLinha = null;
      let meuGraficoPizza = null;
      let calendar = null;
      let editandoId = null;

      const fmt = (v) =>
        "R$ " + (v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 });

      function doLogin() {
        const u = document.getElementById("l-user").value;
        const p = document.getElementById("l-pass").value;
        if (u === "barbosas" && p === "barbosa.2026") {
          sessionStorage.setItem("auth_joao", "true");
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("app-screen").style.display = "block";
          carregarDados();
        } else {
          alert("Acesso negado!");
        }
      }

      async function carregarDados() {
        const { data, error } = await _supabase
          .from("lancamentos2")
          .select("*")
          .order("data", { ascending: true });
        if (!error) {
          lancamentos = data;
          renderTudo();
        }
      }

      async function salvarNoBanco() {
        const dados = {
          tipo: document.getElementById("f-tipo").value,
          data: document.getElementById("f-data").value,
          valor: parseFloat(document.getElementById("f-valor").value),
          status: document.getElementById("f-status").value,
          description: document.getElementById("f-desc").value,
          usuario: document.getElementById("f-usuario").value,
        };

        if (editandoId) {
          await _supabase
            .from("lancamentos2")
            .update(dados)
            .eq("id", editandoId);
        } else {
          await _supabase.from("lancamentos2").insert([dados]);
        }

        closeForm();
        carregarDados();
      }

      async function marcarComoPago(id) {
        await _supabase
          .from("lancamentos2")
          .update({ status: "pago" })
          .eq("id", id);
        carregarDados();
      }

      async function deletar(id) {
        if (confirm("Excluir permanentemente?")) {
          await _supabase.from("lancamentos2").delete().eq("id", id);
          carregarDados();
        }
      }

      function prepararEdicao(id) {
        const l = lancamentos.find((item) => item.id == id);
        if (!l) return;
        editandoId = id;
        document.getElementById("f-tipo").value = l.tipo;
        document.getElementById("f-valor").value = l.valor;
        document.getElementById("f-data").value = l.data;
        document.getElementById("f-status").value = l.status;
        document.getElementById("f-desc").value = l.description;
        document.getElementById("f-usuario").value = l.usuario || "João";
        openForm();
      }

      function renderTudo() {
        const filtroUser = document.getElementById("filtro-usuario").value;
        const filtroMes = document.getElementById("filtro-mes").value; // "YYYY-MM"
        const hoje = new Date().toISOString().split("T")[0];

        // 1. Filtragem com Mês e Usuário
        let dadosFiltrados = lancamentos.filter((l) => {
          const matchesUser =
            filtroUser === "todos" || l.usuario === filtroUser;
          const matchesMes = !filtroMes || l.data.startsWith(filtroMes);
          return matchesUser && matchesMes;
        });

        let ent = 0,
          sai = 0,
          pen = 0;
        const corpo = document.getElementById("tb-corpo");
        const corpoPrazos = document.getElementById("tb-pendencias");
        corpo.innerHTML = "";
        corpoPrazos.innerHTML = "";

        let eventos = [];
        let gastosPorUsuario = { João: 0, Felipe: 0, Annia: 0 };

        // Objeto para agrupar dados do gráfico
        let dadosAgrupadosGrafico = {};

        [...dadosFiltrados].reverse().forEach((l) => {
          const v = parseFloat(l.valor) || 0;
          const dataBR = l.data.split("-").reverse().join("/");

          // Agrupamento para o gráfico: Soma entradas (+) e subtrai saídas (-)
          const valorFluxo = l.tipo === "entrada" ? v : -v;
          dadosAgrupadosGrafico[dataBR] =
            (dadosAgrupadosGrafico[dataBR] || 0) + valorFluxo;

          if (l.status === "pago") {
            if (l.tipo === "entrada") ent += v;
            else {
              sai += v;
              if (gastosPorUsuario[l.usuario] !== undefined)
                gastosPorUsuario[l.usuario] += v;
            }
          } else {
            pen += v;
            eventos.push({
              title: (l.tipo === "saida" ? "▼ " : "▲ ") + l.description,
              start: l.data,
              backgroundColor: l.data < hoje ? "#f05c5c" : "#f5a623",
            });

            corpoPrazos.innerHTML += `
              <tr>
                <td>${dataBR}</td>
                <td>${l.description}</td>
                <td class="amber">${fmt(v)}</td>
                <td>${l.usuario}</td>
                <td><button onclick="marcarComoPago('${l.id}')" style="background:none; border:none; color:var(--green); cursor:pointer">✔ Pagar</button></td>
              </tr>`;
          }

          corpo.innerHTML += `
            <tr>
                <td>${dataBR}</td>
                <td>${l.description} <br><small style="color:var(--text2)">${l.usuario}</small></td>
                <td class="${l.tipo === "entrada" ? "green" : "red"}">${fmt(v)}</td>
                <td><span class="badge ${l.status === "pago" ? "badge-green" : "badge-amber"}">${l.status}</span></td>
                <td>
                    ${l.status === "pendente" ? `<button onclick="marcarComoPago('${l.id}')" style="background:none; border:none; color:var(--green); cursor:pointer; margin-right:10px">✔</button>` : ""}
                    <button onclick="prepararEdicao('${l.id}')" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-right:10px">✎</button>
                    <button onclick="deletar('${l.id}')" style="background:none; border:none; color:var(--text3); cursor:pointer">✖</button>
                </td>
            </tr>`;
        });

        document.getElementById("metrics-cards").innerHTML = `
          <div class="metric"><div class="metric-label">Entradas</div><div class="metric-value green">${fmt(ent)}</div></div>
          <div class="metric"><div class="metric-label">Saídas</div><div class="metric-value red">${fmt(sai)}</div></div>
          <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value blue">${fmt(ent - sai)}</div></div>
          <div class="metric"><div class="metric-label">Pendente</div><div class="metric-value amber">${fmt(pen)}</div></div>
        `;

        document.getElementById("bell-badge").style.display =
          pen > 0 ? "flex" : "none";

        inicializarCalendario(eventos);
        desenharGraficoLinha(dadosAgrupadosGrafico);
        desenharGraficoUsuario(gastosPorUsuario);
      }

      function inicializarCalendario(evs) {
        const el = document.getElementById("calendar");
        if (calendar) calendar.destroy();
        calendar = new FullCalendar.Calendar(el, {
          initialView: "dayGridMonth",
          locale: "pt-br",
          events: evs,
          height: "auto",
          headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,listMonth",
          },
          dateClick: function (info) {
            showPage("lancamentos");
            openForm();
            document.getElementById("f-data").value = info.dateStr;
          },
        });
        calendar.render();
      }

      function desenharGraficoLinha(dadosAgrupados) {
        const ctx = document.getElementById("mainChart").getContext("2d");
        if (meuGraficoLinha) meuGraficoLinha.destroy();

        // Ordenar as datas para o gráfico
        const labels = Object.keys(dadosAgrupados).sort((a, b) => {
          return (
            new Date(a.split("/").reverse().join("-")) -
            new Date(b.split("/").reverse().join("-"))
          );
        });
        const valores = labels.map((label) => dadosAgrupados[label]);

        meuGraficoLinha = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Fluxo Diário",
                data: valores,
                borderColor: "#4f8ef7",
                tension: 0.4,
                fill: true,
                backgroundColor: "rgba(79, 142, 247, 0.1)",
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              y: { grid: { color: "rgba(255,255,255,0.05)" } },
              x: { grid: { display: false } },
            },
          },
        });
      }

      function desenharGraficoUsuario(gastos) {
        const ctx = document.getElementById("userChart").getContext("2d");
        if (meuGraficoPizza) meuGraficoPizza.destroy();
        meuGraficoPizza = new Chart(ctx, {
          type: "bar",
          data: {
            labels: Object.keys(gastos),
            datasets: [
              {
                data: Object.values(gastos),
                backgroundColor: ["#4f8ef7", "#2ec08a", "#f5a623"],
                borderRadius: 8,
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "rgba(255,255,255,0.05)" },
              },
            },
          },
        });
      }

      function showPage(p, el) {
        document
          .querySelectorAll(".page")
          .forEach((d) => (d.style.display = "none"));
        document.getElementById("page-" + p).style.display = "block";
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));
        if (el) el.classList.add("active");
        if (p === "prazos" && calendar)
          setTimeout(() => calendar.updateSize(), 100);
      }

      function openForm() {
        document.getElementById("form-container").style.display = "block";
        window.scrollTo(0, 0);
      }
      function closeForm() {
        document.getElementById("form-container").style.display = "none";
        editandoId = null;
        document.getElementById("f-desc").value = "";
        document.getElementById("f-valor").value = "";
      }

      if (sessionStorage.getItem("auth_joao") === "true") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "block";
        carregarDados();
      }
    </script>
  </body>
</html>
