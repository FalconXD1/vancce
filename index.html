<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FinançasPessoais — João</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
      /* ==========================================
         VARIÁVEIS E RESET
         ========================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f1117;
        --bg2: #181c27;
        --bg3: #1e2233;
        --card: #242840;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8eaf0;
        --text2: #8b90a0;
        --text3: #555a6e;
        --accent: #4f8ef7;
        --green: #2ec08a;
        --red: #f05c5c;
        --amber: #f5a623;
        --radius: 10px;
        --radius-lg: 14px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ==========================================
         LOGIN (REESTRUTURADO)
         ========================================== */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        background: var(--bg);
      }
      .login-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }
      .login-group {
        margin-bottom: 20px;
      }
      .login-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .login-group input {
        width: 100%;
        padding: 14px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 10px;
        color: var(--text);
        font-size: 16px;
      }
      .login-btn {
        width: 100%;
        padding: 15px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      /* ==========================================
         APP LAYOUT (MOBILE FIRST)
         ========================================== */
      #app-screen {
        display: none;
      }

      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 65px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: var(--text2);
        cursor: pointer;
        flex: 1;
      }
      .nav-item.active {
        color: var(--accent);
      }

      .main {
        margin-left: 0;
        padding-bottom: 80px;
      }
      .topbar {
        padding: 20px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .content {
        padding: 15px;
      }

      /* Grid de Métricas 2 por linha no Mobile */
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .metric {
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .metric-value {
        font-size: 18px;
        font-family: "DM Mono", monospace;
      }

      /* Tabelas Roláveis */
      .card {
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px;
      }
      td,
      th {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      /* Formulário em 1 coluna no Mobile */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text);
        border-radius: 8px;
      }

      /* ==========================================
         AJUSTES PARA DESKTOP (> 768px)
         ========================================== */
      @media (min-width: 768px) {
        .sidebar {
          top: 0;
          left: 0;
          width: 240px;
          height: 100vh;
          flex-direction: column;
          justify-content: flex-start;
          padding-top: 30px;
          border-right: 1px solid var(--border);
          border-top: none;
        }
        .nav-item {
          flex-direction: row;
          gap: 10px;
          font-size: 14px;
          padding: 12px 20px;
          text-align: left;
          width: 100%;
        }
        .main {
          margin-left: 240px;
          padding-bottom: 0;
        }
        .metrics {
          grid-template-columns: repeat(4, 1fr);
        }
        .form-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .green {
        color: var(--green);
      }
      .red {
        color: var(--red);
      }
      .badge {
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 10px;
      }
      .badge-green {
        background: rgba(46, 192, 138, 0.1);
        color: var(--green);
      }
      .badge-amber {
        background: rgba(245, 166, 35, 0.1);
        color: var(--amber);
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <h2 style="margin-bottom: 20px; text-align: center">Entrar</h2>
        <div class="login-group">
          <label>Usuário</label><input type="text" id="l-user" />
        </div>
        <div class="login-group">
          <label>Senha</label><input type="password" id="l-pass" />
        </div>
        <button class="login-btn" onclick="doLogin()">Acessar Sistema</button>
      </div>
    </div>

    <div id="app-screen">
      <div class="sidebar">
        <div class="nav-item active" onclick="showPage('dashboard', this)">
          <span>📊</span> Resumo
        </div>
        <div class="nav-item" onclick="showPage('lancamentos', this)">
          <span>📋</span> Lista
        </div>
        <div class="nav-item" onclick="showPage('prazos', this)">
          <span>🗓</span> Prazos
        </div>
        <div class="nav-item" onclick="showPage('relatorios', this)">
          <span>📈</span> Relatórios
        </div>
      </div>

      <div class="main">
        <div class="topbar">
          <div id="page-title" style="font-weight: 600">Painel Financeiro</div>
          <button
            class="login-btn"
            style="width: auto; padding: 8px 15px"
            onclick="
              showPage('lancamentos');
              openForm();
            "
          >
            + Novo
          </button>
        </div>

        <div class="content">
          <div id="page-dashboard" class="page active">
            <select
              id="filtro-usuario"
              onchange="renderTudo()"
              style="
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                background: var(--bg3);
                color: white;
                border-radius: 8px;
                border: 1px solid var(--border2);
              "
            >
              <option value="todos">Todos os Usuários</option>
              <option value="Felipe">Felipe</option>
              <option value="João">João</option>
              <option value="Annia">Annia</option>
            </select>
            <div class="metrics" id="metrics-cards"></div>
            <div class="card">
              <canvas id="mainChart" style="max-height: 250px"></canvas>
            </div>
          </div>

          <div id="page-lancamentos" class="page" style="display: none">
            <div id="form-lancamento" class="card" style="display: none">
              <div class="form-grid">
                <div class="form-group">
                  <label>Tipo</label
                  ><select id="f-tipo">
                    <option value="saida">Saída</option>
                    <option value="entrada">Entrada</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Valor</label
                  ><input type="number" id="f-valor" step="0.01" />
                </div>
                <div class="form-group">
                  <label>Data</label><input type="date" id="f-data" />
                </div>
                <div class="form-group">
                  <label>Responsável</label
                  ><select id="f-usuario">
                    <option value="Felipe">Felipe</option>
                    <option value="João">João</option>
                    <option value="Annia">Annia</option>
                  </select>
                </div>
                <div class="form-group" style="grid-column: 1/-1">
                  <label>Descrição</label><input type="text" id="f-desc" />
                </div>
              </div>
              <div style="margin-top: 15px; display: flex; gap: 10px">
                <button class="login-btn" onclick="salvarNoBanco()">
                  Gravar
                </button>
                <button
                  class="login-btn"
                  style="background: #444"
                  onclick="closeForm()"
                >
                  Fechar
                </button>
              </div>
            </div>
            <div class="card">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tb-corpo"></tbody>
              </table>
            </div>
          </div>

          <div id="page-prazos" class="page" style="display: none">
            <div class="card"><div id="calendar"></div></div>
          </div>

          <div id="page-relatorios" class="page" style="display: none">
            <div class="card"><canvas id="pizzaChart"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SB_URL = "https://zgcimyinowcgwegsjilq.supabase.co";
      const SB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnY2lteWlub3djZ3dlZ3NqaWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ5ODMsImV4cCI6MjA5MDEyMDk4M30.y6pXC74FIfwSAeb6uP3WhftbQ82pVPKchOdQwKKxZJY";
      const _supabase = supabase.createClient(SB_URL, SB_KEY);

      let lancamentos = [],
        meuGraficoLinha = null,
        meuGraficoPizza = null,
        calendar = null;
      const fmt = (v) =>
        "R$ " + (v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 });

      function doLogin() {
        if (
          document.getElementById("l-user").value === "barbosas" &&
          document.getElementById("l-pass").value === "barbosa.2026"
        ) {
          sessionStorage.setItem("auth_joao", "true");
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("app-screen").style.display = "flex";
          carregarDados();
        } else alert("Senha incorreta!");
      }

      async function carregarDados() {
        const { data, error } = await _supabase
          .from("lancamentos2")
          .select("*")
          .order("data", { ascending: false });
        if (!error) {
          lancamentos = data;
          renderTudo();
        }
      }

      async function salvarNoBanco() {
        const dados = {
          tipo: document.getElementById("f-tipo").value,
          data: document.getElementById("f-data").value,
          valor: parseFloat(document.getElementById("f-valor").value),
          status: "pago",
          description: document.getElementById("f-desc").value,
          usuario: document.getElementById("f-usuario").value,
          cat: "Geral",
        };
        await _supabase.from("lancamentos2").insert([dados]);
        closeForm();
        carregarDados();
      }

      async function deletar(id) {
        if (confirm("Excluir?")) {
          await _supabase.from("lancamentos2").delete().eq("id", id);
          carregarDados();
        }
      }

      function renderTudo() {
        const filtro = document.getElementById("filtro-usuario").value;
        const dados = lancamentos.filter(
          (l) => filtro === "todos" || l.usuario === filtro,
        );

        let ent = 0,
          sai = 0;
        const corpo = document.getElementById("tb-corpo");
        corpo.innerHTML = "";

        dados.forEach((l) => {
          if (l.tipo === "entrada") ent += l.valor;
          else sai += l.valor;
          corpo.innerHTML += `<tr>
            <td>${l.data.split("-").reverse().slice(0, 2).join("/")}</td>
            <td>${l.description}<br><small>${l.usuario}</small></td>
            <td class="${l.tipo === "entrada" ? "green" : "red"}">${fmt(l.valor)}</td>
            <td><span class="badge ${l.status === "pago" ? "badge-green" : "badge-amber"}">${l.status}</span></td>
            <td><button onclick="deletar('${l.id}')" style="background:none; border:none; color:gray;">✖</button></td>
          </tr>`;
        });

        document.getElementById("metrics-cards").innerHTML = `
          <div class="metric"><div class="metric-label">Ganhos</div><div class="metric-value green">${fmt(ent)}</div></div>
          <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value red">${fmt(sai)}</div></div>
        `;
        desenharGraficos(dados);
      }

      function desenharGraficos(dados) {
        const ctx = document.getElementById("mainChart").getContext("2d");
        if (meuGraficoLinha) meuGraficoLinha.destroy();
        meuGraficoLinha = new Chart(ctx, {
          type: "line",
          data: {
            labels: dados
              .slice(0, 7)
              .reverse()
              .map((l) => l.data),
            datasets: [
              {
                label: "Fluxo",
                data: dados
                  .slice(0, 7)
                  .reverse()
                  .map((l) => (l.tipo === "entrada" ? l.valor : -l.valor)),
                borderColor: "#4f8ef7",
                tension: 0.3,
              },
            ],
          },
          options: { plugins: { legend: { display: false } } },
        });
      }

      function showPage(p, el) {
        document
          .querySelectorAll(".page")
          .forEach((d) => (d.style.display = "none"));
        document.getElementById("page-" + p).style.display = "block";
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));
        if (el) el.classList.add("active");
      }

      function openForm() {
        document.getElementById("form-lancamento").style.display = "block";
      }
      function closeForm() {
        document.getElementById("form-lancamento").style.display = "none";
      }

      if (sessionStorage.getItem("auth_joao") === "true") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        carregarDados();
      }
    </script>
  </body>
</html>
